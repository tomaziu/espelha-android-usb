name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile application
        run: python -m py_compile phone_mirror.py

      - name: Run tests
        run: python -m unittest discover -s tests -v
